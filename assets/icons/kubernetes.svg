<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <g transform="translate(24,24)">
    <!-- Outer heptagon shape (helm wheel) -->
    <polygon points="0,-21 13.5,-16 20,-4 17,10 7,19 -7,19 -17,10 -20,-4 -13.5,-16" fill="#326CE5" stroke="#fff" stroke-width="1.5"/>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="5" fill="#fff"/>
    <!-- Spokes -->
    <g stroke="#fff" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-5" x2="0" y2="-17"/>
      <line x1="4.5" y1="-2.5" x2="16" y2="-8"/>
      <line x1="4.5" y1="2.5" x2="16" y2="8"/>
      <line x1="0" y1="5" x2="0" y2="16"/>
      <line x1="-4.5" y1="2.5" x2="-16" y2="8"/>
      <line x1="-4.5" y1="-2.5" x2="-16" y2="-8"/>
    </g>
    <!-- Spoke end dots -->
    <g fill="#fff">
      <circle cx="0" cy="-17" r="2"/>
      <circle cx="16" cy="-8" r="2"/>
      <circle cx="16" cy="8" r="2"/>
      <circle cx="0" cy="16" r="2"/>
      <circle cx="-16" cy="8" r="2"/>
      <circle cx="-16" cy="-8" r="2"/>
    </g>
  </g>
</svg>