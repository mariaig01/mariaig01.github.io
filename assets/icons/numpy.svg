<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- 3D matrix/array shape -->
  <!-- Top face -->
  <polygon points="24,4 44,14 24,24 4,14" fill="#4DABCF"/>
  <!-- Left face -->
  <polygon points="4,14 24,24 24,44 4,34" fill="#4DABCF" opacity="0.7"/>
  <!-- Right face -->
  <polygon points="44,14 24,24 24,44 44,34" fill="#4DABCF" opacity="0.5"/>
  <!-- Grid lines on top -->
  <g stroke="#fff" stroke-width="0.8" opacity="0.6">
    <line x1="14" y1="9" x2="34" y2="19"/>
    <line x1="14" y1="19" x2="34" y2="9"/>
  </g>
  <!-- Grid lines on left face -->
  <g stroke="#fff" stroke-width="0.8" opacity="0.4">
    <line x1="4" y1="24" x2="24" y2="34"/>
    <line x1="14" y1="19" x2="14" y2="39"/>
  </g>
  <!-- Grid lines on right face -->
  <g stroke="#fff" stroke-width="0.8" opacity="0.3">
    <line x1="44" y1="24" x2="24" y2="34"/>
    <line x1="34" y1="19" x2="34" y2="39"/>
  </g>
</svg>